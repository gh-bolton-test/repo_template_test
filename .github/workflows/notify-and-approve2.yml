on:
  push:
    branches:
      - 'main'

jobs:
  check-first-run:
    runs-on: ubuntu-latest
    outputs:
      is_first_run: ${{ steps.check.outputs.first_run }}

    steps:
      - uses: actions/checkout@v4
      
      - name: Check if this is first run
        id: check
        run: |
          if [ -f ".bolton/approved" ]; then
            echo "first_run=false" >> $GITHUB_OUTPUT
          else
            echo "first_run=true" >> $GITHUB_OUTPUT
          fi
      
      #- name: Send Teams notification
      ####

  setup-environment:
    needs: check-first-run
    runs-on: ubuntu-latest
    if: ${{ needs.check-first-run.outputs.is_first_run == 'true'}}
    
    steps:
      - name: Create business-approval environment
        run:  |
          curl --fail -L \
            -X PUT \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.ORG_ADMIN_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            https://api.github.com/repos/${{ github.repository }}/environments/business-approval


